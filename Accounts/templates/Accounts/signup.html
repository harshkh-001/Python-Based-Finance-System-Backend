{% extends 'Accounts/base.html' %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div style="max-width:400px; margin:auto; background:white; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; margin-bottom:25px; color:#1f2937;">
        Sign Up
    </h2>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}
    <form method="post" action="save_user">
        {% csrf_token %}

        <!-- Name -->
        <div style="margin-bottom:15px;">
            <label>Name</label>
            <input type="text" name="name" required
                minlength="3" maxlength="50"
                pattern="[A-Za-z ]+"
                title="Only letters allowed"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Email -->
        <div style="margin-bottom:15px;">
            <label>Email</label>
            <input type="email" name="email" required
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Mobile Number -->
        <div style="margin-bottom:15px;">
            <label>Mobile Number</label>
            <input type="tel" name="mobile_number" required
                pattern="[0-9]{10}"
                maxlength="10"
                title="Enter a valid 10-digit number"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Username -->
        <div style="margin-bottom:15px;">
            <label>Username</label>
            <input type="text" name="username" required
                minlength="4" maxlength="20"
                pattern="[A-Za-z0-9_]+"
                title="Only letters, numbers, and underscore allowed"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Password -->
        <div style="margin-bottom:15px;">
            <label>Password</label>
            <input type="password" name="password" required
                minlength="6"
                title="Minimum 6 characters"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Role -->
        <div style="margin-bottom:20px;">
            <label>Login As</label>
            <select name="role" required
                    style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                <option value="">Select Role</option>
                <option value="viewer">Viewer</option>
                <option value="analyst">Analyst</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <!-- Submit -->
        <button type="submit"
                style="width:100%; padding:12px; background:#1f2937; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer;">
            Sign Up
        </button>
    </form>

</div>
{% endblock %}
