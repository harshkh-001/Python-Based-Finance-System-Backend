<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Finance Tracker{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar-brand {
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard">FinanceTracker</a>

    <div class="ms-auto d-flex align-items-center gap-3">
        
        {% if user.is_authenticated %}
            <!-- User Icon -->
            <i class="bi bi-person-circle text-white fs-4"></i>

            <!-- Username -->
            <span class="text-white">{{ user.username }}</span>

            <!-- Logout -->
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                Logout
            </a>
        {% else %}
            <!-- Login -->
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                Login
            </a>

            <!-- Signup -->
            <a href="{% url 'signup' %}" class="btn btn-outline-light btn-sm">
                Signup
            </a>
        {% endif %}

    </div>
</nav>

<!-- 📦 Content -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
