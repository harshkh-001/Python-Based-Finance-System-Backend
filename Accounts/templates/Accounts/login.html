{% extends 'Accounts/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width:400px; margin:auto; background:white; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; margin-bottom:25px; color:#1f2937;">
        Login
    </h2>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}
    
    <form method="post" action="login">
        {% csrf_token %}

        <!-- Username -->
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px;">Username</label>
            <input type="text" name="username" required
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Password -->
        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:5px;">Password</label>
            <input type="password" name="password" required
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Role -->
        <!-- <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:5px;">Login As</label>
            <select name="role" required
                    style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                <option value="">Select Role</option>
                <option value="admin">Viewer</option>
                <option value="admin">Analyst</option>
                <option value="employee">Admin</option>
            </select>
        </div> -->

        <!-- Submit -->
        <button type="submit"
                style="width:100%; padding:12px; background:#1f2937; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer;">
            Login
        </button>
    </form>

</div>
{% endblock %}
