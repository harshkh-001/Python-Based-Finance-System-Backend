{% extends 'Users/base.html' %}

{% block title %}Delete Transaction{% endblock %}

{% block content %}
<div style="max-width:400px; margin:auto; background:white; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; margin-bottom:25px; color:#1f2937;">
        Delete Transaction
    </h2>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="post" action="/api/delete-transaction">
        {% csrf_token %}

        <div style="margin-bottom:15px;">
        <label>ID</label>
        <select name="id" id="dataSelect" required>
            <option value="">-- Select ID --</option>

            {% for item in data %}
                <option value="{{ item.id }}"
                    data-amount="{{ item.amount }}"
                    data-type="{{ item.transaction_type }}"
                    data-category="{{ item.category }}"
                    data-description="{{ item.description }}">
                    {{ item.id }}
                </option>
            {% endfor %}
        </select>
        </div>
        <br>

        <h5>Amount : <span  id="amountText">-</span></h5>
        <h5>Transaction Type : <span id="typeText">-</span></h5>
        <h5>Category : <span id="categoryText">-</span></h5>
        <h5>Description : <span id="descriptionText">-</span></h5>

        <!-- Submit -->
        <button type="submit"
                style="width:100%; padding:12px; background:#1f2937; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer;">
            Delete Transaction
        </button>
    </form>

</div>

<script>
document.getElementById("dataSelect").addEventListener("change", function() {
    const selected = this.options[this.selectedIndex];

    if (!this.value) return;

    document.getElementById("amountText").innerText = selected.dataset.amount || "-";
    document.getElementById("typeText").innerText = selected.dataset.type || "-";
    document.getElementById("categoryText").innerText = selected.dataset.category || "-";
    document.getElementById("descriptionText").innerText = selected.dataset.description || "-";
});
</script>
{% endblock %}
