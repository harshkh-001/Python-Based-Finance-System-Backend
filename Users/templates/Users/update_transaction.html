{% extends 'Users/base.html' %}

{% block title %}Update Transaction{% endblock %}

{% block content %}
<div style="max-width:400px; margin:auto; background:white; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; margin-bottom:25px; color:#1f2937;">
        Update Transaction
    </h2>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="post" action="/api/update-transaction">
        {% csrf_token %}

        <div style="margin-bottom:15px;">
        <label>ID</label>
        <select name="id" id="dataSelect" required>
            <option value="">-- Select ID --</option>

            {% for item in data %}
                <option value="{{ item.id }}"
                    data-amount="{{ item.amount }}"
                    data-type="{{ item.transaction_type }}"
                    data-category="{{ item.category }}"
                    data-description="{{ item.description }}">
                    {{ item.id }}
                </option>
            {% endfor %}
        </select>
        </div>

        <!-- Amount -->
        <div style="margin-bottom:15px;">
            <label>Amount</label>
            <input type="number" name="amount" required
                step="0.01" min="0"
                title="Enter a valid amount"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Transaction Type -->
        <div style="margin-bottom:15px;">
            <label>Transaction Type</label>
            <select name="transaction_type" required
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                <option value="">Select Type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <!-- Category -->
        <div style="margin-bottom:15px;">
            <label>Category</label>
            <input type="text" name="category" required
                minlength="3" maxlength="30"
                pattern="[A-Za-z ]+"
                title="Only letters allowed"
                placeholder="e.g. Food, Salary"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
        </div>

        <!-- Description -->
        <div style="margin-bottom:20px;">
            <label>Description</label>
            <textarea name="description"
                maxlength="200"
                placeholder="Optional"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;"></textarea>
        </div>

        <!-- Submit -->
        <button type="submit"
                style="width:100%; padding:12px; background:#1f2937; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer;">
            Update Transaction
        </button>
    </form>

</div>

<script>
document.getElementById("dataSelect").addEventListener("change", function() {
    const selected = this.options[this.selectedIndex];

    if (!this.value) return;

    document.querySelector("input[name='amount']").value = selected.dataset.amount || "";
    document.querySelector("select[name='transaction_type']").value = selected.dataset.type || "";
    document.querySelector("input[name='category']").value = selected.dataset.category || "";
    document.querySelector("textarea[name='description']").value = selected.dataset.description || "";
});
</script>
{% endblock %}
