{% extends 'Users/base.html' %}

{% block title %}Update Transaction{% endblock %}

{% block content %}
<div style="max-width:400px; margin:auto; background:white; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; margin-bottom:25px; color:#1f2937;">
        Update Transaction
    </h2>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="get" action="/api/get-filter-transactions">
        {% csrf_token %}

        <div style="margin-bottom:15px;">
            <label>Date</label>
            <select name="date" id="dataSelect">
                <option value="">-- Select Date --</option>

                {% for item in date %}
                    <option value="{{ item|date:'Y-m-d' }}">
                        {{ item|date:"j F Y" }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom:15px;">
        <label>Category</label>
        <select name="category" id="dataSelect" required>
            <option value="">-- Select Category --</option>

            {% for item in category %}
                <option value="{{ item }}">
                    {{ item }}
                </option>
            {% endfor %}
        </select>
        </div>

        <div style="margin-bottom:15px;">
        <label>Transaction Type</label>
        <select name="transaction_type" id="dataSelect" required>
            <option value="">-- Select Transaction Type --</option>

            {% for item in transaction_type %}
                <option value="{{ item }}">
                    {{ item }}
                </option>
            {% endfor %}
        </select>
        </div>

        <!-- Submit -->
        <button type="submit"
                style="width:100%; padding:12px; background:#1f2937; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer;">
            Search Transactions
        </button>
    </form>

</div>
{% endblock %}
